<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Klasifikasi Monyet vs Kera</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex items-center justify-center p-6">

    <div class="max-w-sm w-full bg-white border border-slate-200 rounded-xl p-6 shadow-sm">
        
        <div class="text-center mb-6">
            <h1 class="text-xl font-bold text-slate-900">
                Detektor Monyet & Kera
            </h1>
            <p class="text-xs text-slate-400 mt-1">
                Unggah foto primata untuk klasifikasi spesies
            </p>
        </div>

        <form action="/predict" method="post" enctype="multipart/form-data" class="space-y-4">
            
            <div class="relative">
                <label for="file-upload" class="flex flex-col items-center justify-center w-full h-48 border border-dashed border-slate-300 rounded-lg cursor-pointer bg-slate-50 hover:bg-slate-100/50 hover:border-emerald-600 transition-colors overflow-hidden">
                    
                    <div id="upload-prompt" class="flex flex-col items-center justify-center text-center p-4">
                        <svg class="w-8 h-8 mb-2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 4v16m8-8H4"></path>
                        </svg>
                        <p class="text-xs font-medium text-slate-600">Pilih atau Seret Gambar</p>
                    </div>

                    <img id="image-preview" src="#" alt="Preview" class="hidden w-full h-full object-cover" />
                    
                </label>
                <input id="file-upload" type="file" name="file" accept="image/*" class="hidden" required onchange="previewImage(this)">
            </div>

            <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium py-2.5 px-4 rounded-lg transition-colors cursor-pointer text-center">
                Analisis Gambar
            </button>
        </form>

        <div class="mt-6 pt-4 border-t border-slate-100 text-[10px] text-center text-slate-400 uppercase tracking-wider">
            AI Classification
        </div>
    </div>

    <script>
        function previewImage(input) {
            const preview = document.getElementById('image-preview');
            const prompt = document.getElementById('upload-prompt');
            
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.classList.remove('hidden');
                    prompt.classList.add('hidden');
                }
                
                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
